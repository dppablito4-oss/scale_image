<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Image A0 - A10 | Imposición de Impresión</title>
  <link rel="stylesheet" href="index.css">
  <!-- Cargar Konva.js y jsPDF -->
  <script src="https://unpkg.com/konva@9/konva.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <div class="app-container">
    
    <!-- Barra Lateral -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">S</div>
        <h1 class="brand-title">ScaleImage</h1>
      </div>


      <!-- Cargar Imágenes -->
      <div>
        <h2 class="section-title">Subir Imágenes (PNG / JPG)</h2>
        <div class="upload-zone" id="drop-zone">
          <div class="upload-icon">✦</div>
          <div class="upload-text">Arrastra imágenes aquí</div>
          <div class="upload-subtext">o haz clic para seleccionar</div>
          <input type="file" id="file-input" accept="image/png, image/jpeg, image/jpg" multiple style="display: none;">
        </div>
      </div>

      <!-- Lista de Imágenes Cargadas en Storage -->
      <div>
        <h2 class="section-title">Galería de Archivos</h2>
        <div class="image-list" id="image-list-container">
          <!-- Las imágenes cargadas se mostrarán aquí -->
        </div>
      </div>

      <!-- Panel de Distribución Automática (Serie A) -->
      <div class="selected-details" id="auto-layout-panel">
        <h2 class="section-title">Distribución Espiral (A1 - A10)</h2>
        
        <!-- Estado de Imagen Activa -->
        <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.75rem; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.75rem;">
          <div style="width: 40px; height: 40px; border-radius: 6px; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; overflow: hidden;" id="active-thumb-container">
            <span style="font-size: 1.25rem; color: var(--text-muted);">📷</span>
          </div>
          <div style="flex: 1; min-width: 0;">
            <div style="font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600;">Imagen Activa</div>
            <div style="font-size: 0.8125rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-main);" id="active-img-name">Ninguna seleccionada</div>
          </div>
        </div>

        <!-- Selector de límite de la serie -->
        <div class="input-field" style="margin-top: 0.25rem;">
          <label for="layout-limit-select">Límite de la Serie A</label>
          <select id="layout-limit-select" class="select-field">
            <option value="none">Ninguno (Lienzo vacío)</option>
            <option value="A1">Hasta A1 (1 imagen)</option>
            <option value="A2">Hasta A2 (2 imágenes)</option>
            <option value="A3">Hasta A3 (3 imágenes)</option>
            <option value="A4" selected>Hasta A4 (4 imágenes)</option>
            <option value="A5">Hasta A5 (5 imágenes)</option>
            <option value="A6">Hasta A6 (6 imágenes)</option>
            <option value="A7">Hasta A7 (7 imágenes)</option>
            <option value="A8">Hasta A8 (8 imágenes)</option>
            <option value="A9">Hasta A9 (9 imágenes)</option>
            <option value="A10">Hasta A10 (10 imágenes)</option>
            <option value="custom">Personalizado</option>
          </select>
        </div>

        <!-- Checkboxes individuales -->
        <div class="checkbox-grid" style="margin-top: 0.75rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; background: rgba(0,0,0,0.2); border: 1px solid var(--border-color); padding: 0.75rem; border-radius: 8px;">
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A1" checked> <label for="chk-A1">A1</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A2" checked> <label for="chk-A2">A2</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A3" checked> <label for="chk-A3">A3</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A4" checked> <label for="chk-A4">A4</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A5"> <label for="chk-A5">A5</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A6"> <label for="chk-A6">A6</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A7"> <label for="chk-A7">A7</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A8"> <label for="chk-A8">A8</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A9"> <label for="chk-A9">A9</label>
          </div>
          <div class="checkbox-item" style="display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem;">
            <input type="checkbox" id="chk-A10"> <label for="chk-A10">A10</label>
          </div>
        </div>
      </div>

      <!-- Generación -->
      <div style="margin-top: auto; padding-top: 1rem;">
        <button class="btn-primary" id="btn-generate-pdf" disabled>
          <span>Compilar PDF de Impresión</span>
          <span style="font-size: 1.1em;">➔</span>
        </button>
      </div>
    </aside>

    <!-- Área del Canvas -->
    <main class="canvas-wrapper">
      <div class="canvas-toolbar">
        <h3 class="canvas-title">Lienzo A0 (841 x 1189 mm)</h3>
        <div class="canvas-actions">
          <span class="toolbar-info" id="canvas-status">Lienzo vacío</span>
          <button class="btn-secondary" id="btn-clear-canvas" style="padding: 0.5rem 1rem;">Limpiar Todo</button>
        </div>
      </div>

      <div class="canvas-viewport">
        <!-- Contenedor del lienzo de Konva -->
        <div id="konva-container"></div>
      </div>
    </main>

  </div>

  <!-- Notificaciones Toast -->
  <div class="toast" id="toast-notification">
    <span class="toast-icon">✦</span>
    <span class="toast-message" id="toast-message-text">Notificación</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
