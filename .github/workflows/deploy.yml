name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Otorgar permisos necesarios para que GitHub Actions pueda publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cancelar ejecuciones en curso si se sube un nuevo cambio antes de terminar la anterior
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Subir la raíz del proyecto (que contiene index.html, index.css, app.js y CNAME)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
